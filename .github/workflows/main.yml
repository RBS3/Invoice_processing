name: UIPath CI/CD with Failure Notification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup UiPath Robot
        run: |
          choco install uipath-robot

      - name: Install UiPath Dependencies
        run: |
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.Excel.Activities"
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.GSuite.Activities"
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.Mail.Activities"
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.MicrosoftDynamicsFO.Activities"
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.PDF.Activities"
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --install-packages "UiPath.Automation.Activities"

      - name: Run UiPath Project
        run: |
          "C:\Program Files\UiPath\Studio\UiPath.Studio.exe" --file "C:\path\to\your\project\invoice_processing.xaml"

      #  (optional)
      - name: Upload Logs
        uses: actions/upload-artifact@v3
        with:
          name: uipath-logs
          path: C:\Users\YourUser\AppData\Local\UiPath\Logs

      - name: Send Slack notification (failure)
        if: failure()  
        uses: slackapi/slack-github-action@v1.21.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          text: "🚨 UIPath Automation failed in GitHub Actions. Please check the logs."
      - name: Commit and push changes (if needed)
        run: |
          git config --global user.name "Your Name"
          git config --global user.email "youremail@example.com"
          git add .
          git commit -m "Automated commit after running UiPath"
          git push
