name: UiPath CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install UiPath CLI
        run: choco install uipath-cli -y

      - name: Pack UiPath project
        run: |
          uipcli pack "path\to\project.json" -o output

      - name: Login to Orchestrator
        run: |
          uipcli login `
            --url "${{ secrets.ORCH_URL }}" `
            --clientId "${{ secrets.ORCH_CLIENT_ID }}" `
            --clientSecret "${{ secrets.ORCH_CLIENT_SECRET }}" `
            --accountName "${{ secrets.ORCH_ACCOUNT }}" `
            --serviceName "${{ secrets.ORCH_SERVICE }}" `
            --tenant "${{ secrets.ORCH_TENANT }}"

      - name: Push package to Orchestrator
        run: |
          uipcli push -p output\YourProjectName.1.0.0.nupkg

      - name: Trigger job in Orchestrator
        run: |
          uipcli jobs start --releaseKey "${{ secrets.RELEASE_KEY }}" --strategy "ModernJobsCount" --jobsCount 1

      - name: Upload Logs (optional)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: uipath-logs
          path: C:\Users\YourUser\AppData\Local\UiPath\Logs

      - name: Slack Notification on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.21.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          text: "🚨 UiPath job failed. Check logs in GitHub Actions."
