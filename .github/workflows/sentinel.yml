
name: Sentinel Arsenal
on: [push]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scanner
        env:
          SENTINEL_SECRET: ${{ secrets.SENTINEL_SECRET }}
          SENTINEL_URL: ${{ secrets.SENTINEL_URL }}
        run: |
          echo "{\"repo_name\": \"RBS3/Invoice_processing\", \"origin\": \"scanner\"}" > report.json
          SIG=$(openssl dgst -sha256 -hmac "$SENTINEL_SECRET" report.json | sed 's/.* //')
          curl -X POST "$SENTINEL_URL" -H "X-Sentinel-Signature: $SIG" -H "Content-Type: application/json" -d @report.json
